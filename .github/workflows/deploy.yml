name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run check

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          PUBLIC_YOUTUBE_PLAYLIST_ID: ${{ vars.YOUTUBE_PLAYLIST_ID }}

# ─────────────────────────────────────────────────────────
# Required GitHub secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — from vercel.com/account/tokens
#   VERCEL_ORG_ID      — from vercel project settings
#   VERCEL_PROJECT_ID  — from vercel project settings
#
# Required GitHub vars (Settings → Variables → Actions):
#   PUBLIC_SITE_URL          — e.g. https://filadelfia.live
#   YOUTUBE_CHANNEL_ID       — YouTube channel ID (public)
#   YOUTUBE_PLAYLIST_ID      — YouTube playlist ID (public)
#
# Rollback: revert the commit on main and push.
#   git revert HEAD --no-edit && git push origin main
# ─────────────────────────────────────────────────────────
