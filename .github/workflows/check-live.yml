name: Check Live & Notify

on:
  schedule:
    # Joi 17:00–21:00 România (UTC+3 = UTC 14:00–18:00), la fiecare 10 min
    - cron: '*/10 14-18 * * 4'
    # Duminică 8:00–13:00 România (UTC+3 = UTC 5:00–10:00), la fiecare 10 min
    - cron: '*/10 5-10 * * 0'
  workflow_dispatch: # permite rulare manuală din GitHub

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - name: Check live status and notify subscribers
        run: |
          STATUS=$(curl -sf https://filadelfia.live/api/live-status || echo '{"isLive":false}')
          IS_LIVE=$(echo "$STATUS" | jq -r '.isLive')
          VIDEO_ID=$(echo "$STATUS" | jq -r '.videoId // empty')
          TITLE=$(echo "$STATUS" | jq -r '.title // empty')

          echo "Live: $IS_LIVE | VideoId: $VIDEO_ID"

          if [ "$IS_LIVE" = "true" ]; then
            curl -s -X POST https://filadelfia.live/api/notify-live \
              -H "Content-Type: application/json" \
              -d "{\"videoId\":\"$VIDEO_ID\",\"title\":\"$TITLE\"}"
            echo "Notification sent."
          else
            echo "Not live, skipping."
          fi
