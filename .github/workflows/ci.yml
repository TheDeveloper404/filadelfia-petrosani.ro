name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run check

      - name: Build (dry-run to catch build errors)
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://filadelfia.live
          PUBLIC_YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID || 'UCplaceholder' }}
          PUBLIC_YOUTUBE_PLAYLIST_ID: ${{ vars.YOUTUBE_PLAYLIST_ID || 'PLplaceholder' }}
